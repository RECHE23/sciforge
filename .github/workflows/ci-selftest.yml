name: CI selftest

# Exercises the reusable lint-cpp workflow against the in-repo fixture
# (examples/lint_consumer/) so the spine is developed and validated HERE, on
# SciForge's own minutes, before any consumer adopts it. A consumer adoption that
# goes red means a bug to fix and re-green HERE — never an iterative debug loop in
# the consumer's CI. Trunk-based, so push-only (github.sha is a real commit that the
# reusable workflow can check out as the lint/ source).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-cpp:
    uses: ./.github/workflows/lint-cpp.yml
    with:
      # The fixture is a leaf, but pass a harmless public dep so the dependency-
      # checkout loop (jq parse, git clone, the idempotent rm -rf) in the shared
      # composite is exercised here. (SciForge has no self-hosted runner — those are
      # per-repo — so the self-hosted persistence path is validated on the first
      # routed consumer, not here.)
      deps: '[{"repo":"RECHE23/sciforge","path":"dep-probe"}]'
      sciforge-ref: ${{ github.sha }}         # lint/ + harness from the commit under test
      runner-mode: hosted
      makefile-subdir: examples/lint_consumer

  # Exercise the reusable build spine with EVERY platform toggle on (the selftest
  # runs on GitHub-hosted runners, which include macOS): posix linux g++-14 +
  # clang++ and macOS clang++ with sanitizers, and the full cmake matrix (linux-x64
  # + windows-msvc + arm) configure/build/test/install + find_package smoke against
  # the buildable fixture. Leaf fixture (deps='[]'); the composite's jq-free clone
  # loop is covered by the lint-cpp job above (same composite).
  build-cpp:
    uses: ./.github/workflows/build-cpp.yml
    with:
      deps: '[]'
      sciforge-ref: ${{ github.sha }}
      runner-mode: hosted
      makefile-subdir: examples/lint_consumer
      enable-macos: true
      enable-windows-msvc: true
      enable-arm: true

  # Exercise the reusable Python-binding spine with both platform toggles on (hosted
  # runners have macOS + Windows): build the abi3 extension (pip install -e .) and run
  # the unittest suite across {linux, macos, windows} x {3.10, 3.14} against the
  # py_consumer fixture. Leaf (deps='[]'). The self-hosted-Windows venv path can't be
  # exercised here (no SciForge self-hosted runner) — first proven at the scinum
  # routed adoption, same gap as B1/B2.
  python-cpp:
    uses: ./.github/workflows/python-cpp.yml
    with:
      sciforge-ref: ${{ github.sha }}
      deps: '[]'
      runner-mode: hosted
      project-subdir: examples/py_consumer
      enable-macos: true
      enable-windows: true

  # Exercise the reusable release wheel-build spine: cibuildwheel (abi3) + sdist on
  # the full 4-OS matrix against the py_consumer fixture, so any per-OS cibuildwheel
  # issue is caught HERE before a publisher adopts it. Uses the default wheel-os.
  # Limit: py_consumer is a leaf, so this proves the cibuildwheel mechanism + artifact
  # upload, NOT the build-system.requires PyPI resolution (first proven at scilex,
  # which pulls real-regex from PyPI at wheel-build time). check-version is a no-op
  # here (this is a branch push, not a version tag).
  build-wheels:
    uses: ./.github/workflows/build-wheels.yml
    with:
      package-dir: examples/py_consumer

  # N1 binding-substrate self-test (design (a)): build the build-time-only
  # sciforge-build package INLINE, then build + test the binding fixture against it via
  # --find-links — proving the off-sibling substrate delivery (set_cpp_error's three
  # branches + the GIL above/below + the load-bearing restore-on-throw) without
  # sciforge-build being on PyPI yet. Across Linux + macOS + Windows/MSVC — the early
  # substrate-under-MSVC wiring, so N2/N3 (the templated casters) won't meet MSVC cold.
  # Kept separate from python-cpp / build-wheels above, whose py_consumer fixture stays
  # a PyPI-clean leaf.
  binding-selftest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Build the build-time-only sciforge-build package
        shell: bash
        run: |
          python -m pip install --upgrade pip build
          python -m build --outdir dist python/sciforge-build
      - name: Build + test the binding fixture against sciforge-build (off-PyPI, --find-links)
        shell: bash
        run: |
          python -m pip install ./examples/binding_consumer --find-links dist
          python -m unittest discover -s examples/binding_consumer/python/tests -v
