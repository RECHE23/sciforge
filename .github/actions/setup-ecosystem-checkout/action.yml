name: setup-ecosystem-checkout
description: >
  Checks out the calling consumer (at ./consumer) and its dependency siblings
  (cloned from a JSON list, public or private via ci-pat) as workspace-root
  siblings. The dependency clones are idempotent — they rm -rf the target first —
  so this is safe on the persistent self-hosted runner workspace (where a plain
  git clone would hit "already exists").

  The caller checks out SciForge itself (to ./sciforge) in a PRIOR step. That
  bootstrap does double duty: a reusable workflow can only reach a local action
  after the action's repository is checked out, so the bootstrap is what makes
  THIS action resolvable (referenced as ./sciforge/.github/actions/...); and it
  provides the shared lint/ config + test harness the build/lint steps consume.
  Shared by the lint-cpp and build-cpp reusable workflows so the checkout of the
  consumer + deps lives in one place.

inputs:
  deps:
    description: 'JSON array of {repo, path} dependency siblings, in topological order.'
    default: '[]'
  ci-pat:
    description: 'Token with read access for private dependency checkouts (optional).'
    default: ''

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        path: consumer
    - name: Checkout dependency siblings (idempotent)
      if: inputs.deps != '[]'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.ci-pat }}
      run: |
        # jq-free parse: this step runs on the job runner, including self-hosted
        # Windows where jq is not guaranteed. Split the compact JSON array into one
        # object per line, then extract repo/path with sed. The deps JSON shape is
        # caller-controlled: [{"repo":"...","path":"..."},...]. The
        # `|| [ -n "$obj" ]` keeps the final object (no trailing newline after the
        # split).
        printf '%s' '${{ inputs.deps }}' \
          | sed -e 's/^[[:space:]]*\[//' -e 's/\][[:space:]]*$//' -e 's/},[[:space:]]*{/}\n{/g' \
          | while IFS= read -r obj || [ -n "$obj" ]; do
              [ -z "$obj" ] && continue
              repo=$(printf '%s' "$obj" | sed -n 's/.*"repo"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
              path=$(printf '%s' "$obj" | sed -n 's/.*"path"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
              url="https://github.com/$repo.git"
              if [ -n "${GH_TOKEN:-}" ]; then
                url="https://x-access-token:$GH_TOKEN@github.com/$repo.git"
              fi
              rm -rf "$path"
              git clone --depth 1 "$url" "$path"
            done
